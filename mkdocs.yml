site_name: EKF-HIL Sat
site_description: Documentação do projeto de ADCS para nanossatélites com validação HIL
site_author: Equipe PION Sat - Universidade de Brasília
site_url: https://mmonteirov.github.io/ADCS-PionSAT-UnB/

repo_name: mmonteirov/ADCS-PionSAT-UnB
repo_url: https://github.com/mmonteirov/ADCS-PionSAT-UnB
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt-BR
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Usar tema escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Usar tema claro

nav:
  - Início: index.md
  - Arquitetura: arquitetura.md
  - Configuração do ambiente: setup.md
  - Roadmap: roadmap.md
  - Referências: referencias.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

plugins:
  - search:
      lang: pt

exclude_docs: |
  proposta/
  relatorios/
  paper/

copyright: Copyright &copy; 2026 Equipe PION Sat - Universidade de Brasília
